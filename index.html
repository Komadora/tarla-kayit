<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Tarla Kaydı</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #21262d;
      --text: #e6edf3;
      --muted: #7d8590;
      --green: #3fb950;
      --blue: #388bfd;
      --red: #f85149;
      --yellow: #d29922;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      position: sticky; top: 0; z-index: 10;
    }
    .header h1 { font-size: 1rem; font-weight: 600; flex: 1; }
    .back-btn { background: none; border: none; color: var(--blue); font-size: 1.1rem; cursor: pointer; padding: 4px 8px; }

    .screen { flex: 1; display: none; flex-direction: column; padding: 16px; gap: 12px; overflow-y: auto; }
    .screen.active { display: flex; }

    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px; }
    .card h3 { font-size: 0.78rem; color: var(--muted); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.06em; }

    input, select {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 10px 12px;
      font-size: 0.95rem;
      font-family: inherit;
    }
    input:focus { outline: none; border-color: var(--blue); }

    .btn {
      border: none; border-radius: 8px; padding: 12px 16px;
      font-size: 0.95rem; font-weight: 500; cursor: pointer;
      font-family: inherit; width: 100%; transition: opacity 0.15s;
    }
    .btn:active { opacity: 0.75; }
    .btn:disabled { opacity: 0.35; cursor: default; }
    .btn-primary { background: var(--blue); color: #fff; }
    .btn-success { background: var(--green); color: #fff; }
    .btn-danger  { background: var(--red); color: #fff; }
    .btn-muted   { background: var(--surface); color: var(--text); border: 1px solid var(--border); }

    /* Trial list */
    .trial-item {
      display: flex; align-items: center; gap: 12px; padding: 12px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; cursor: pointer;
    }
    .trial-item:active { opacity: 0.7; }
    .trial-item .info { flex: 1; }
    .trial-item .t-name { font-weight: 600; }
    .trial-item .t-meta { font-size: 0.82rem; color: var(--muted); margin-top: 3px; }
    .badge { font-size: 0.75rem; padding: 3px 9px; border-radius: 20px; font-weight: 600; white-space: nowrap; }
    .badge-done { background: #1a3a2a; color: var(--green); }
    .badge-wip  { background: #1a2a3a; color: var(--blue); }
    .empty-state { text-align: center; color: var(--muted); padding: 40px 20px; line-height: 1.7; }

    /* Setup tags */
    .inline-row { display: flex; gap: 8px; }
    .inline-row input { flex: 1; }
    .inline-row .btn { width: auto; padding: 10px 14px; flex-shrink: 0; }
    .tag-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
    .tag {
      background: #1a2a3a; border: 1px solid #2a3a4a; border-radius: 20px;
      padding: 4px 10px; font-size: 0.85rem; display: flex; align-items: center; gap: 6px;
    }
    .tag button { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1rem; line-height: 1; padding: 0; }

    /* Progress */
    .progress-bar { height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--green); border-radius: 3px; transition: width 0.4s; }
    .progress-text { font-size: 0.8rem; color: var(--muted); text-align: right; margin-top: 4px; }

    /* Cell info */
    .cell-info-card { text-align: center; }
    .rep-label   { font-size: 0.85rem; color: var(--muted); margin-bottom: 4px; }
    .treat-label { font-size: 1.5rem; font-weight: 700; margin-bottom: 4px; }
    .meas-label  { font-size: 1rem; color: var(--yellow); }

    /* Value display */
    .value-display {
      text-align: center; background: var(--surface);
      border: 2px solid var(--border); border-radius: 14px; padding: 22px 16px;
      transition: border-color 0.2s;
    }
    .value-display.confirmed { border-color: var(--green); }
    .value-display.listening { border-color: var(--blue); }
    .val { font-size: 2.8rem; font-weight: 700; min-height: 64px; display: flex; align-items: center; justify-content: center; letter-spacing: 0.02em; }
    .val.interim { color: var(--muted); font-style: italic; font-size: 1.8rem; }
    .val-hint { font-size: 0.82rem; color: var(--muted); margin-top: 6px; min-height: 1.2em; }

    /* Mic button */
    .mic-wrap { display: flex; justify-content: center; }
    .mic-btn {
      width: 82px; height: 82px; border-radius: 50%; border: 2px solid var(--border);
      background: var(--surface); font-size: 2rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center; transition: all 0.2s;
    }
    .mic-btn.listening  { background: #0d2b4a; border-color: var(--blue); animation: pulse 1.4s infinite; }
    .mic-btn.confirming { background: #0d3a1a; border-color: var(--green); }
    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0 rgba(56,139,253,0.35); }
      70%  { box-shadow: 0 0 0 16px rgba(56,139,253,0); }
      100% { box-shadow: 0 0 0 0 rgba(56,139,253,0); }
    }

    .countdown { text-align: center; font-size: 0.88rem; color: var(--green); min-height: 1.4em; font-weight: 500; }

    /* Dikte input */
    .dikte-wrap { display: flex; flex-direction: column; gap: 8px; }
    .dikte-input {
      width: 100%; background: var(--bg); border: 2px solid var(--border);
      border-radius: 10px; color: var(--text); padding: 14px;
      font-size: 1.6rem; font-family: inherit; text-align: center;
      font-weight: 700; letter-spacing: 0.04em;
    }
    .dikte-input:focus { outline: none; border-color: var(--blue); }
    .dikte-hint { font-size: 0.8rem; color: var(--muted); text-align: center; }

    /* Nav row */
    .nav-row { display: flex; gap: 8px; }
    .nav-row .btn { flex: 1; padding: 11px 8px; font-size: 0.88rem; }

    /* Export table */
    .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; margin-top: 6px; }
    table { border-collapse: collapse; font-size: 0.82rem; min-width: 100%; }
    th, td { border: 1px solid var(--border); padding: 7px 10px; text-align: left; white-space: nowrap; }
    th { background: var(--surface); color: var(--muted); font-weight: 600; }
    tr:nth-child(even) td { background: #0a0f15; }
    .missing { color: var(--red); }

    .divider { border: none; border-top: 1px solid var(--border); }
  </style>
  <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
</head>
<body>

<div class="header" id="header">
  <button class="back-btn" id="back-btn" hidden>‹</button>
  <h1 id="header-title">Tarla Kaydı</h1>
</div>

<!-- HOME -->
<div class="screen active" id="screen-home">
  <button class="btn btn-primary" id="btn-new-trial">+ Yeni Deneme Oluştur</button>
  <div id="trials-list"></div>
</div>

<!-- SETUP -->
<div class="screen" id="screen-setup">
  <div class="card">
    <h3>Deneme Adı</h3>
    <input type="text" id="inp-trial-name" placeholder="ör. Buğday Gübre Denemesi 2025">
  </div>
  <div class="card">
    <h3>Tekerrür Sayısı</h3>
    <input type="number" id="inp-reps" value="3" min="1" max="30">
  </div>
  <div class="card">
    <h3>Uygulamalar / Konular</h3>
    <div class="inline-row">
      <input type="text" id="inp-treat" placeholder="ör. T0, T1, Kontrol…">
      <button class="btn btn-muted inline-row" id="btn-add-treat">Ekle</button>
    </div>
    <div class="tag-list" id="treat-tags"></div>
  </div>
  <div class="card">
    <h3>Ölçümler</h3>
    <div class="inline-row">
      <input type="text" id="inp-meas" placeholder="ör. Bitki boyu (cm)">
      <button class="btn btn-muted" id="btn-add-meas">Ekle</button>
    </div>
    <div class="tag-list" id="meas-tags"></div>
  </div>
  <button class="btn btn-success" id="btn-start-entry">▶ Veri Girişine Başla</button>
</div>

<!-- ENTRY -->
<div class="screen" id="screen-entry">
  <div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    <div class="progress-text" id="progress-text">0 / 0</div>
  </div>

  <div class="card cell-info-card" id="cell-card">
    <div class="rep-label"   id="rep-label"></div>
    <div class="treat-label" id="treat-label"></div>
    <div class="meas-label"  id="meas-label"></div>
  </div>

  <!-- iOS: klavye diktesi -->
  <div class="dikte-wrap" id="dikte-wrap">
    <input class="dikte-input" id="dikte-input" type="text" inputmode="decimal"
           placeholder="değer girin" autocomplete="off" autocorrect="off" spellcheck="false">
    <div class="dikte-hint">Klavyedeki 🎤 ile sesli girin veya yazın</div>
  </div>

  <!-- Android: Web Speech API -->
  <div class="value-display" id="val-display" style="display:none">
    <div class="val" id="val-text">—</div>
    <div class="val-hint" id="val-hint">Mikrofona basın ve değeri söyleyin</div>
  </div>

  <div class="countdown" id="countdown"></div>

  <div class="mic-wrap" id="mic-wrap" style="display:none">
    <button class="mic-btn" id="entry-mic">🎙️</button>
  </div>

  <div class="nav-row">
    <button class="btn btn-muted" id="btn-prev">← Önceki</button>
    <button class="btn btn-muted" id="btn-skip">Atla →</button>
    <button class="btn btn-success" id="btn-confirm">✓ Kaydet</button>
  </div>

  <hr class="divider">
  <button class="btn btn-primary" id="btn-go-export">📊 Özet & CSV İndir</button>
</div>

<!-- EXPORT -->
<div class="screen" id="screen-export">
  <button class="btn btn-success" id="btn-dl-csv">⬇ Excel İndir (.xlsx)</button>
  <div class="card">
    <h3>Veri Önizleme</h3>
    <div class="table-wrap"><table id="data-table"></table></div>
  </div>
  <hr class="divider">
  <button class="btn btn-danger" id="btn-delete">🗑 Bu Denemeyi Sil</button>
</div>

<script>
// ─── STORAGE ────────────────────────────────────────────────
let trials = JSON.parse(localStorage.getItem('tarla_v1') || '[]');
let active = null;
let curIdx  = 0;
let tempVal = '';
let cdTimer = null;
let recog   = null;

const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

function persist() { localStorage.setItem('tarla_v1', JSON.stringify(trials)); }

// ─── CELL MATH ───────────────────────────────────────────────
function total(t) { return t.replications * t.treatments.length * t.measurements.length; }

function cellAt(t, idx) {
  const nm = t.measurements.length, nt = t.treatments.length;
  const rep   = Math.floor(idx / (nt * nm));
  const rem   = idx % (nt * nm);
  const treat = Math.floor(rem / nm);
  const meas  = rem % nm;
  return { rep, treat, meas };
}

function ck(rep, treat) { return rep + '_' + treat; }

function getv(t, rep, treat, meas) {
  return ((t.data[ck(rep,treat)] || {})[meas]) ?? '';
}

function setv(t, rep, treat, meas, val) {
  if (!t.data[ck(rep,treat)]) t.data[ck(rep,treat)] = {};
  t.data[ck(rep,treat)][meas] = val;
}

function filled(t) {
  let n = 0;
  for (let i = 0; i < total(t); i++) {
    const {rep,treat,meas} = cellAt(t, i);
    if (getv(t,rep,treat,meas) !== '') n++;
  }
  return n;
}

// ─── SCREEN ROUTER ───────────────────────────────────────────
const TITLES = { home:'Tarla Kaydı', setup:'Yeni Deneme', entry:'Veri Girişi', export:'Özet & Dışa Aktar' };

function show(name) {
  ['home','setup','entry','export'].forEach(s => {
    document.getElementById('screen-'+s).classList.toggle('active', s===name);
  });
  document.getElementById('header-title').textContent = TITLES[name];
  document.getElementById('back-btn').hidden = (name==='home');
}

document.getElementById('back-btn').addEventListener('click', () => {
  stopRec();
  if (active && document.getElementById('screen-entry').classList.contains('active')) {
    show('home'); renderHome();
  } else if (document.getElementById('screen-export').classList.contains('active')) {
    show('entry'); renderEntry();
  } else {
    show('home'); renderHome();
  }
});

// ─── HOME ────────────────────────────────────────────────────
function renderHome() {
  const el = document.getElementById('trials-list');
  if (!trials.length) {
    el.innerHTML = '<div class="empty-state">Henüz deneme yok.<br>Yeni bir deneme oluşturun.</div>';
    return;
  }
  el.innerHTML = trials.map(t => {
    const d = filled(t), tot = total(t);
    const pct = tot ? Math.round(d/tot*100) : 0;
    const badge = pct===100
      ? '<span class="badge badge-done">Tamamlandı</span>'
      : `<span class="badge badge-wip">%${pct}</span>`;
    return `<div class="trial-item" onclick="openTrial('${t.id}')">
      <div class="info">
        <div class="t-name">${t.name}</div>
        <div class="t-meta">${t.replications} tekerrür · ${t.treatments.length} uygulama · ${t.measurements.length} ölçüm</div>
        <div class="t-meta">${t.date}</div>
      </div>${badge}</div>`;
  }).join('');
}

window.openTrial = function(id) {
  active = trials.find(t => t.id===id);
  curIdx = active.lastIndex || 0;
  show('entry'); renderEntry();
};

document.getElementById('btn-new-trial').addEventListener('click', () => {
  document.getElementById('inp-trial-name').value = '';
  document.getElementById('inp-reps').value = '3';
  document.getElementById('treat-tags').innerHTML = '';
  document.getElementById('meas-tags').innerHTML = '';
  _treats = []; _meass = [];
  show('setup');
});

// ─── SETUP ───────────────────────────────────────────────────
let _treats = [], _meass = [];

function renderTagList(arr, id, type) {
  document.getElementById(id).innerHTML = arr.map((v,i) =>
    `<div class="tag">${v}<button onclick="rmTag('${type}',${i})">×</button></div>`
  ).join('');
}

window.rmTag = function(type, i) {
  if (type==='t') { _treats.splice(i,1); renderTagList(_treats,'treat-tags','t'); }
  else            { _meass.splice(i,1);  renderTagList(_meass,'meas-tags','m'); }
};

function addTag(inpId, arr, tagsId, type) {
  const inp = document.getElementById(inpId);
  const v = inp.value.trim();
  if (v) { arr.push(v); inp.value = ''; renderTagList(arr, tagsId, type); }
  inp.focus();
}

document.getElementById('btn-add-treat').addEventListener('click', () => addTag('inp-treat',_treats,'treat-tags','t'));
document.getElementById('btn-add-meas').addEventListener('click',  () => addTag('inp-meas',_meass,'meas-tags','m'));
document.getElementById('inp-treat').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('btn-add-treat').click(); });
document.getElementById('inp-meas').addEventListener('keydown',  e => { if(e.key==='Enter') document.getElementById('btn-add-meas').click(); });

document.getElementById('btn-start-entry').addEventListener('click', () => {
  const name = document.getElementById('inp-trial-name').value.trim();
  const reps = parseInt(document.getElementById('inp-reps').value)||3;
  if (!name)          { alert('Deneme adı girin.'); return; }
  if (!_treats.length){ alert('En az bir uygulama ekleyin.'); return; }
  if (!_meass.length) { alert('En az bir ölçüm ekleyin.'); return; }

  const t = {
    id: Date.now().toString(),
    name, date: new Date().toLocaleDateString('tr-TR'),
    replications: reps,
    treatments: [..._treats],
    measurements: [..._meass],
    data: {}, lastIndex: 0,
  };
  trials.push(t); persist();
  active = t; curIdx = 0;
  show('entry'); renderEntry();
});

// iOS tespiti
const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);

// Giriş modunu ayarla
function setupInputMode() {
  document.getElementById('dikte-wrap').style.display  = isIOS ? 'flex'  : 'none';
  document.getElementById('val-display').style.display = isIOS ? 'none'  : 'block';
  document.getElementById('mic-wrap').style.display    = isIOS ? 'none'  : 'flex';
}

// ─── ENTRY ───────────────────────────────────────────────────
function renderEntry() {
  if (!active) return;
  setupInputMode();
  const t = active;
  const tot = total(t);
  const {rep, treat, meas} = cellAt(t, curIdx);

  // progress
  const done = filled(t);
  document.getElementById('progress-fill').style.width = (tot ? done/tot*100 : 0) + '%';
  document.getElementById('progress-text').textContent = `${done} / ${tot} hücre`;

  // cell info
  document.getElementById('rep-label').textContent   = `Tekerrür ${rep+1} / ${t.replications}`;
  document.getElementById('treat-label').textContent = t.treatments[treat];
  document.getElementById('meas-label').textContent  = t.measurements[meas];

  // value
  const existing = getv(t, rep, treat, meas);
  if (isIOS) {
    const inp = document.getElementById('dikte-input');
    inp.value = existing;
    inp.placeholder = t.measurements[meas];
    setTimeout(() => inp.focus(), 100);
  } else {
    updateDisplay(existing, existing !== '');
  }
  tempVal = existing;
  document.getElementById('btn-prev').disabled = curIdx===0;
  clearCd();
}

function updateDisplay(v, confirmed) {
  const disp = document.getElementById('val-display');
  const el   = document.getElementById('val-text');
  el.textContent = v || '—';
  el.className   = 'val' + (!confirmed && v ? ' interim' : '');
  disp.className = 'value-display' + (confirmed ? ' confirmed' : v ? ' listening' : '');
  document.getElementById('val-hint').textContent = confirmed
    ? '✓ Kaydedildi — bir sonrakine geçiliyor'
    : (v ? 'Onaylamak için ✓ Kaydet\'e basın' : 'Mikrofona basın ve değeri söyleyin');
}

function doConfirm(val) {
  if (val === '' || val === null || val === undefined || !active) return;
  const {rep,treat,meas} = cellAt(active, curIdx);
  setv(active, rep, treat, meas, String(val).trim());
  active.lastIndex = curIdx;
  persist();
  if (!isIOS) {
    updateDisplay(val, true);
    document.getElementById('entry-mic').className = 'mic-btn confirming';
  }
  clearCd();
  setTimeout(() => {
    if (!isIOS) document.getElementById('entry-mic').className = 'mic-btn';
    if (curIdx < total(active)-1) { curIdx++; renderEntry(); }
    else { document.getElementById('progress-text').textContent = '🎉 Tüm değerler girildi!'; }
  }, 400);
}

// iOS: input değişince tempVal güncelle
document.getElementById('dikte-input').addEventListener('input', e => {
  tempVal = e.target.value;
});

// iOS: Return/Done tuşu → otomatik kaydet
document.getElementById('dikte-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); doConfirm(tempVal); }
});

// countdown (Android için)
function startCd(val) {
  clearCd();
  let s = 2;
  const el = document.getElementById('countdown');
  el.textContent = `${s} sn içinde kaydedilecek…`;
  cdTimer = setInterval(() => {
    s--;
    if (s <= 0) { clearCd(); doConfirm(val); }
    else el.textContent = `${s} sn içinde kaydedilecek…`;
  }, 1000);
}

function clearCd() {
  if (cdTimer) { clearInterval(cdTimer); cdTimer = null; }
  document.getElementById('countdown').textContent = '';
}

document.getElementById('btn-confirm').addEventListener('click', () => {
  const val = isIOS ? document.getElementById('dikte-input').value : tempVal;
  clearCd(); doConfirm(val);
});

document.getElementById('btn-prev').addEventListener('click', () => {
  clearCd(); stopRec();
  if (curIdx > 0) { curIdx--; renderEntry(); }
});

document.getElementById('btn-skip').addEventListener('click', () => {
  clearCd(); stopRec();
  if (curIdx < total(active)-1) { curIdx++; renderEntry(); }
});

document.getElementById('btn-go-export').addEventListener('click', () => {
  stopRec(); renderExport(); show('export');
});

// ─── SPEECH (Android) ────────────────────────────────────────
document.getElementById('entry-mic').addEventListener('click', () => {
  const btn = document.getElementById('entry-mic');
  if (!SR) { alert('Tarayıcınız ses tanımayı desteklemiyor. Chrome kullanın.'); return; }
  if (btn.classList.contains('listening')) { stopRec(); return; }

  clearCd();
  tempVal = '';
  updateDisplay('', false);

  recog = new SR();
  recog.lang = 'tr-TR';
  recog.continuous = false;
  recog.interimResults = true;

  recog.onresult = e => {
    let interim='', final='';
    for (let i=e.resultIndex; i<e.results.length; i++) {
      const tx = e.results[i][0].transcript.trim();
      if (e.results[i].isFinal) final=tx; else interim=tx;
    }
    const v = final || interim;
    tempVal = v;
    updateDisplay(v, false);
    if (final) { btn.className = 'mic-btn'; startCd(final); }
  };

  recog.onend = () => { btn.className = 'mic-btn'; };
  recog.onerror = e => {
    btn.className = 'mic-btn';
    if (e.error !== 'no-speech') document.getElementById('val-hint').textContent = 'Hata: ' + e.error;
  };

  recog.start();
  btn.className = 'mic-btn listening';
});

function stopRec() {
  if (recog) { try { recog.stop(); } catch(e){} recog = null; }
  document.getElementById('entry-mic').className = 'mic-btn';
  clearCd();
}

// ─── EXPORT ──────────────────────────────────────────────────
function renderExport() {
  const t = active;
  const headers = ['Tekerrür', 'Uygulama', ...t.measurements];
  let html = '<thead><tr>' + headers.map(h=>`<th>${h}</th>`).join('') + '</tr></thead><tbody>';
  for (let r=0; r<t.replications; r++) {
    for (let tr=0; tr<t.treatments.length; tr++) {
      html += '<tr><td>'+(r+1)+'</td><td>'+t.treatments[tr]+'</td>';
      t.measurements.forEach((_,mi) => {
        const v = getv(t, r, tr, mi);
        html += v !== '' ? `<td>${v}</td>` : `<td class="missing">—</td>`;
      });
      html += '</tr>';
    }
  }
  html += '</tbody>';
  document.getElementById('data-table').innerHTML = html;
}

document.getElementById('btn-dl-csv').addEventListener('click', () => {
  const t = active;
  const rows = [['Tekerrür','Uygulama',...t.measurements]];
  for (let r=0; r<t.replications; r++) {
    for (let tr=0; tr<t.treatments.length; tr++) {
      const row = [r+1, t.treatments[tr]];
      t.measurements.forEach((_,mi) => {
        const v = getv(t,r,tr,mi);
        const num = parseFloat(v);
        row.push(v !== '' && !isNaN(num) ? num : v);
      });
      rows.push(row);
    }
  }
  const ws = XLSX.utils.aoa_to_sheet(rows);
  // Sütun genişlikleri
  ws['!cols'] = rows[0].map((_, i) => ({ wch: i < 2 ? 14 : 18 }));
  // Başlık satırı kalın
  rows[0].forEach((_, i) => {
    const cell = ws[XLSX.utils.encode_cell({r:0, c:i})];
    if (cell) cell.s = { font: { bold: true } };
  });
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, t.name.slice(0,31));
  XLSX.writeFile(wb, (t.name+'_'+t.date).replace(/[\s/\\:*?"<>|]/g,'_')+'.xlsx');
});

document.getElementById('btn-delete').addEventListener('click', () => {
  if (!confirm(`"${active.name}" silinsin mi? Bu işlem geri alınamaz.`)) return;
  trials = trials.filter(t=>t.id!==active.id);
  persist(); active=null;
  show('home'); renderHome();
});

// ─── INIT ────────────────────────────────────────────────────
renderHome();
</script>
</body>
</html>
