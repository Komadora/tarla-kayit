<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Tarla Kaydı</title>
  <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {
      --bg: #0d1117; --surface: #161b22; --border: #21262d;
      --text: #e6edf3; --muted: #7d8590;
      --green: #3fb950; --blue: #388bfd; --red: #f85149; --yellow: #d29922;
    }
    body { background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; min-height:100dvh; display:flex; flex-direction:column; }

    /* HEADER */
    .header { background:var(--surface); border-bottom:1px solid var(--border); padding:14px 16px; display:flex; align-items:center; gap:10px; position:sticky; top:0; z-index:10; }
    .header h1 { font-size:1rem; font-weight:600; flex:1; }
    .back-btn { background:none; border:none; color:var(--blue); font-size:1.2rem; cursor:pointer; padding:4px 8px; }

    /* SCREENS */
    .screen { flex:1; display:none; flex-direction:column; padding:16px; gap:14px; overflow-y:auto; }
    .screen.active { display:flex; }

    /* CARDS */
    .card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:16px; }
    .card-title { font-size:0.75rem; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; margin-bottom:12px; font-weight:600; }

    /* INPUTS */
    input[type=text] { width:100%; background:var(--bg); border:1px solid var(--border); border-radius:8px; color:var(--text); padding:11px 13px; font-size:1rem; font-family:inherit; }
    input[type=text]:focus { outline:none; border-color:var(--blue); }

    /* BUTTONS */
    .btn { border:none; border-radius:8px; padding:13px 16px; font-size:.95rem; font-weight:500; cursor:pointer; font-family:inherit; width:100%; transition:opacity .15s; }
    .btn:active { opacity:.7; } .btn:disabled { opacity:.3; cursor:default; }
    .btn-primary { background:var(--blue); color:#fff; }
    .btn-success { background:var(--green); color:#fff; }
    .btn-danger  { background:var(--red);  color:#fff; }
    .btn-muted   { background:var(--surface); color:var(--text); border:1px solid var(--border); }

    /* STEPPER */
    .stepper-row { display:flex; align-items:center; justify-content:space-between; }
    .stepper-label { font-size:.95rem; }
    .stepper-label small { display:block; font-size:.78rem; color:var(--muted); margin-top:2px; }
    .stepper { display:flex; align-items:center; gap:0; border:1px solid var(--border); border-radius:10px; overflow:hidden; }
    .stepper button { background:var(--bg); border:none; color:var(--text); width:44px; height:44px; font-size:1.3rem; cursor:pointer; display:flex; align-items:center; justify-content:center; }
    .stepper button:active { background:var(--border); }
    .stepper .val { width:52px; text-align:center; font-size:1.2rem; font-weight:700; border-left:1px solid var(--border); border-right:1px solid var(--border); line-height:44px; }

    /* PREVIEW */
    .preview-grid { display:flex; flex-wrap:wrap; gap:5px; margin-top:8px; }
    .char-chip { background:var(--bg); border:1px solid var(--border); border-radius:6px; padding:3px 8px; font-size:.78rem; color:var(--muted); }
    .char-chip.rep1 { color:#79c0ff; border-color:#1f3d5c; }
    .char-chip.rep2 { color:#a5d6a7; border-color:#1b3a2a; }
    .char-chip.rep3 { color:#ffcc80; border-color:#3a2e1a; }
    .char-chip.repN { color:var(--muted); border-color:var(--border); }

    /* TRIAL LIST */
    .trial-item { display:flex; align-items:center; gap:12px; padding:13px; background:var(--surface); border:1px solid var(--border); border-radius:12px; cursor:pointer; }
    .trial-item:active { opacity:.7; }
    .trial-item .info { flex:1; }
    .t-name { font-weight:600; font-size:.98rem; }
    .t-meta { font-size:.8rem; color:var(--muted); margin-top:3px; }
    .badge { font-size:.73rem; padding:3px 9px; border-radius:20px; font-weight:600; white-space:nowrap; }
    .badge-done { background:#1a3a2a; color:var(--green); }
    .badge-wip  { background:#1a2a3a; color:var(--blue); }
    .empty-state { text-align:center; color:var(--muted); padding:48px 20px; line-height:1.8; font-size:.92rem; }

    /* PROGRESS */
    .prog-bar { height:5px; background:var(--border); border-radius:3px; overflow:hidden; }
    .prog-fill { height:100%; background:var(--green); border-radius:3px; transition:width .4s; }
    .prog-text { font-size:.78rem; color:var(--muted); text-align:right; margin-top:4px; }

    /* ENTRY CELL INFO */
    .cell-card { text-align:center; padding:18px; }
    .cell-rep   { font-size:.82rem; color:var(--muted); margin-bottom:6px; }
    .cell-plant { font-size:2rem; font-weight:800; line-height:1; }
    .cell-char  { font-size:1rem; color:var(--yellow); margin-top:4px; }
    .cell-sub   { font-size:.78rem; color:var(--muted); margin-top:2px; }

    /* DIKTE INPUT (iOS) */
    .dikte-wrap { display:flex; flex-direction:column; gap:6px; }
    .dikte-input { width:100%; background:var(--bg); border:2px solid var(--border); border-radius:10px; color:var(--text); padding:14px; font-size:2rem; font-family:inherit; text-align:center; font-weight:700; letter-spacing:.04em; }
    .dikte-input:focus { outline:none; border-color:var(--blue); }
    .dikte-hint { font-size:.78rem; color:var(--muted); text-align:center; }

    /* WEB SPEECH (Android) */
    .val-display { text-align:center; background:var(--surface); border:2px solid var(--border); border-radius:14px; padding:20px 16px; transition:border-color .2s; }
    .val-display.confirmed { border-color:var(--green); }
    .val-display.listening { border-color:var(--blue); }
    .val-big { font-size:2.6rem; font-weight:700; min-height:62px; display:flex; align-items:center; justify-content:center; }
    .val-big.interim { color:var(--muted); font-style:italic; font-size:1.6rem; }
    .val-hint { font-size:.8rem; color:var(--muted); margin-top:6px; min-height:1.2em; }

    /* MIC */
    .mic-wrap { display:flex; justify-content:center; }
    .mic-btn { width:80px; height:80px; border-radius:50%; border:2px solid var(--border); background:var(--surface); font-size:2rem; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .2s; }
    .mic-btn.listening  { background:#0d2b4a; border-color:var(--blue); animation:pulse 1.4s infinite; }
    .mic-btn.confirming { background:#0d3a1a; border-color:var(--green); }
    @keyframes pulse { 0%{box-shadow:0 0 0 0 rgba(56,139,253,.35)} 70%{box-shadow:0 0 0 16px rgba(56,139,253,0)} 100%{box-shadow:0 0 0 0 rgba(56,139,253,0)} }

    .countdown { text-align:center; font-size:.86rem; color:var(--green); min-height:1.4em; font-weight:500; }

    /* NAV ROW */
    .nav-row { display:flex; gap:8px; }
    .nav-row .btn { flex:1; padding:11px 6px; font-size:.86rem; }

    /* EXPORT TABLE */
    .table-wrap { overflow-x:auto; -webkit-overflow-scrolling:touch; margin-top:8px; }
    table { border-collapse:collapse; font-size:.8rem; min-width:100%; }
    th,td { border:1px solid var(--border); padding:6px 9px; text-align:center; white-space:nowrap; }
    th { background:var(--surface); color:var(--muted); font-weight:600; }
    td.row-label { background:var(--surface); color:var(--muted); font-weight:600; }
    tr:nth-child(even) td { background:#0a0f15; }
    td.empty { color:var(--red); }
    .section-header { background:#0d1f0d !important; color:var(--green) !important; font-weight:700; text-align:left !important; }

    hr.divider { border:none; border-top:1px solid var(--border); }

    /* CONTACTS */
    .contact-row { display:flex; align-items:center; gap:8px; padding:8px 0; border-bottom:1px solid var(--border); }
    .contact-row:last-child { border-bottom:none; }
    .contact-name { flex:1; font-size:.92rem; }
    .contact-phone { font-size:.78rem; color:var(--muted); }
    .btn-wa { background:#25d366; color:#fff; border:none; border-radius:8px; padding:7px 12px; font-size:.82rem; font-weight:600; cursor:pointer; white-space:nowrap; }
    .btn-wa:active { opacity:.75; }
    .btn-rm { background:none; border:none; color:var(--muted); cursor:pointer; font-size:1.1rem; padding:4px; }
  </style>
</head>
<body>

<div class="header">
  <button class="back-btn" id="back-btn" hidden>‹</button>
  <h1 id="header-title">Tarla Kaydı</h1>
</div>

<!-- HOME -->
<div class="screen active" id="screen-home">
  <button class="btn btn-primary" id="btn-new">+ Yeni Deneme Tasarla</button>
  <div id="trials-list"></div>
</div>

<!-- SETUP / DESIGN -->
<div class="screen" id="screen-setup">
  <div class="card">
    <div class="card-title">Deneme Adı</div>
    <input type="text" id="inp-name" placeholder="ör. Buğday Verim Denemesi 2025">
  </div>

  <div class="card">
    <div class="card-title">Parametreler</div>
    <div style="display:flex;flex-direction:column;gap:14px;">

      <div class="stepper-row">
        <div class="stepper-label">Tekerrür Sayısı<small>Kaç kez tekrarlanacak?</small></div>
        <div class="stepper">
          <button onclick="step('reps',-1)">−</button>
          <div class="val" id="val-reps">3</div>
          <button onclick="step('reps',+1)">+</button>
        </div>
      </div>

      <div class="stepper-row">
        <div class="stepper-label">Bitki Sayısı<small>Her tekerrürde kaç bitki?</small></div>
        <div class="stepper">
          <button onclick="step('plants',-1)">−</button>
          <div class="val" id="val-plants">10</div>
          <button onclick="step('plants',+1)">+</button>
        </div>
      </div>

      <div class="stepper-row">
        <div class="stepper-label">Karakter Sayısı<small>Kaç özellik ölçülecek?</small></div>
        <div class="stepper">
          <button onclick="step('chars',-1)">−</button>
          <div class="val" id="val-chars">10</div>
          <button onclick="step('chars',+1)">+</button>
        </div>
      </div>

    </div>
  </div>

  <div class="card">
    <div class="card-title">Önizleme — Oluşacak Karakterler</div>
    <div class="preview-grid" id="preview-grid"></div>
  </div>

  <button class="btn btn-success" id="btn-create">▶ Denemeyi Oluştur & Veri Girişine Başla</button>
</div>

<!-- ENTRY -->
<div class="screen" id="screen-entry">
  <div>
    <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
    <div class="prog-text" id="prog-text">0 / 0</div>
  </div>

  <div class="card cell-card" id="cell-card">
    <div class="cell-rep"   id="cell-rep"></div>
    <div class="cell-plant" id="cell-plant"></div>
    <div class="cell-char"  id="cell-char"></div>
    <div class="cell-sub"   id="cell-sub"></div>
  </div>

  <!-- Değer göstergesi -->
  <div class="val-display" id="val-display">
    <div class="val-big" id="val-big">—</div>
    <div class="val-hint" id="val-hint">Mikrofona basın veya aşağıya yazın</div>
  </div>
  <div class="countdown" id="countdown"></div>

  <!-- Mikrofon (herkes) -->
  <div class="mic-wrap">
    <button class="mic-btn" id="mic-btn">🎙️</button>
  </div>

  <!-- Manuel giriş (her zaman görünür) -->
  <div class="dikte-wrap" id="dikte-wrap">
    <input class="dikte-input" id="dikte-inp" type="text"
           placeholder="manuel giriş" autocomplete="off" autocorrect="off" spellcheck="false">
  </div>

  <div class="nav-row">
    <button class="btn btn-muted" id="btn-prev">← Önceki</button>
    <button class="btn btn-muted" id="btn-skip">Atla →</button>
    <button class="btn btn-success" id="btn-confirm">✓ Kaydet</button>
  </div>

  <hr class="divider">
  <button class="btn btn-primary" id="btn-to-export">📊 Özet & Excel İndir</button>
</div>

<!-- EXPORT -->
<div class="screen" id="screen-export">
  <div style="display:flex;gap:8px;">
    <button class="btn btn-success" id="btn-dl" style="flex:1">⬇ İndir</button>
    <button class="btn btn-primary" id="btn-share" style="flex:1">📤 Paylaş</button>
  </div>

  <div class="card" id="contacts-card">
    <div class="card-title">Hızlı WhatsApp Paylaşım</div>
    <div id="contacts-list"></div>
    <div style="display:flex;gap:8px;margin-top:10px;">
      <input type="text" id="inp-cname" placeholder="İsim" style="flex:1">
      <input type="tel"  id="inp-cphone" placeholder="90 5XX XXX XX XX" style="flex:1.4">
      <button class="btn btn-muted" id="btn-add-contact" style="width:auto;padding:10px 12px;flex-shrink:0">Ekle</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Önizleme</div>
    <div class="table-wrap"><table id="exp-table"></table></div>
  </div>
  <hr class="divider">
  <button class="btn btn-danger" id="btn-del">🗑 Denemeyi Sil</button>
</div>

<script>
// ── STORAGE ─────────────────────────────────────────────────
let trials = JSON.parse(localStorage.getItem('tarla_v2') || '[]');
let active = null, curIdx = 0, tempVal = '', cdTimer = null, recog = null;
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
function persist() { localStorage.setItem('tarla_v2', JSON.stringify(trials)); }

// ── CELL MATH ────────────────────────────────────────────────
// Order: rep → plant → char
function totalCells(t) { return t.reps * t.plants * t.chars; }

function cellAt(t, idx) {
  // Sıra: tekerrür → karakter → bitki (yukarıdan aşağıya: önce 1.bitki 101, 2.bitki 101...)
  const rep   = Math.floor(idx / (t.chars * t.plants));
  const rem   = idx % (t.chars * t.plants);
  const char  = Math.floor(rem / t.plants);
  const plant = rem % t.plants;
  return { rep, plant, char };
}

function charCode(rep, charIdx) { return (rep + 1) * 100 + charIdx + 1; }  // 101,102... / 201,202...

function cellKey(rep, plant, char) { return `${rep}_${plant}_${char}`; }

function getv(t, rep, plant, char) { return t.data[cellKey(rep, plant, char)] ?? ''; }
function setv(t, rep, plant, char, v) { t.data[cellKey(rep, plant, char)] = v; }

function filledCount(t) {
  return Object.values(t.data).filter(v => v !== '').length;
}

// ── SETUP STEPPERS ───────────────────────────────────────────
const cfg = { reps: 3, plants: 10, chars: 10 };
const limits = { reps:[1,20], plants:[1,50], chars:[1,30] };

window.step = function(key, delta) {
  cfg[key] = Math.min(limits[key][1], Math.max(limits[key][0], cfg[key] + delta));
  document.getElementById('val-'+key).textContent = cfg[key];
  renderPreview();
};

function renderPreview() {
  const el = document.getElementById('preview-grid');
  const repClasses = ['rep1','rep2','rep3','repN'];
  let html = '';
  for (let r = 0; r < Math.min(cfg.reps, 3); r++) {
    for (let c = 0; c < cfg.chars; c++) {
      html += `<span class="char-chip ${repClasses[r]}">${charCode(r,c)}</span>`;
    }
  }
  if (cfg.reps > 3) {
    html += `<span class="char-chip repN">…+${cfg.reps - 3} tekerrür daha</span>`;
  }
  el.innerHTML = html;
}

// ── SCREEN ROUTER ────────────────────────────────────────────
function show(name) {
  ['home','setup','entry','export'].forEach(s =>
    document.getElementById('screen-'+s).classList.toggle('active', s===name)
  );
  const titles = { home:'Tarla Kaydı', setup:'Deneme Tasarımı', entry:'Veri Girişi', export:'Özet & Dışa Aktar' };
  document.getElementById('header-title').textContent = titles[name];
  document.getElementById('back-btn').hidden = name === 'home';
}

document.getElementById('back-btn').addEventListener('click', () => {
  stopRec();
  if (document.getElementById('screen-entry').classList.contains('active'))       { show('home'); renderHome(); }
  else if (document.getElementById('screen-export').classList.contains('active')) { show('entry'); renderEntry(); }
  else { show('home'); renderHome(); }
});

// ── HOME ─────────────────────────────────────────────────────
function renderHome() {
  const el = document.getElementById('trials-list');
  if (!trials.length) {
    el.innerHTML = '<div class="empty-state">Henüz deneme yok.<br>Yeni bir deneme tasarlayın.</div>';
    return;
  }
  el.innerHTML = trials.map(t => {
    const done = filledCount(t), tot = totalCells(t);
    const pct  = tot ? Math.round(done/tot*100) : 0;
    const badge = pct===100
      ? '<span class="badge badge-done">Tamamlandı</span>'
      : `<span class="badge badge-wip">%${pct}</span>`;
    return `<div class="trial-item" onclick="openTrial('${t.id}')">
      <div class="info">
        <div class="t-name">${t.name}</div>
        <div class="t-meta">${t.reps} tekerrür · ${t.plants} bitki · ${t.chars} karakter</div>
        <div class="t-meta">${t.date}</div>
      </div>${badge}</div>`;
  }).join('');
}

window.openTrial = function(id) {
  active = trials.find(t => t.id === id);
  curIdx = active.lastIdx || 0;
  show('entry'); renderEntry();
};

document.getElementById('btn-new').addEventListener('click', () => {
  cfg.reps = 3; cfg.plants = 10; cfg.chars = 10;
  ['reps','plants','chars'].forEach(k => document.getElementById('val-'+k).textContent = cfg[k]);
  document.getElementById('inp-name').value = '';
  renderPreview();
  show('setup');
});

// ── SETUP ────────────────────────────────────────────────────
document.getElementById('btn-create').addEventListener('click', () => {
  const name = document.getElementById('inp-name').value.trim();
  if (!name) { alert('Deneme adı girin.'); return; }
  const t = {
    id: Date.now().toString(),
    name, date: new Date().toLocaleDateString('tr-TR'),
    reps: cfg.reps, plants: cfg.plants, chars: cfg.chars,
    data: {}, lastIdx: 0,
  };
  trials.push(t); persist();
  active = t; curIdx = 0;
  show('entry'); renderEntry();
});

// ── ENTRY ────────────────────────────────────────────────────
function renderEntry() {
  if (!active) return;
  const t = active, tot = totalCells(t);
  const { rep, plant, char } = cellAt(t, curIdx);
  const code = charCode(rep, char);

  const done = filledCount(t);
  document.getElementById('prog-fill').style.width = (tot ? done/tot*100 : 0) + '%';
  document.getElementById('prog-text').textContent = `${done} / ${tot} hücre`;

  document.getElementById('cell-rep').textContent   = `Tekerrür ${rep+1} / ${t.reps}`;
  document.getElementById('cell-plant').textContent = `Bitki ${plant+1}`;
  document.getElementById('cell-char').textContent  = `Karakter ${code}`;
  document.getElementById('cell-sub').textContent   = `${char+1}. karakter · ${plant+1}/${t.plants} bitki`;

  const existing = getv(t, rep, plant, char);
  tempVal = existing;
  document.getElementById('dikte-inp').value = existing;
  updateValDisplay(existing, existing !== '');

  document.getElementById('btn-prev').disabled = curIdx === 0;
  clearCd();
}

function updateValDisplay(v, confirmed) {
  const el = document.getElementById('val-big');
  el.textContent = v || '—';
  el.className = 'val-big' + (!confirmed && v ? ' interim' : '');
  document.getElementById('val-display').className = 'val-display' + (confirmed ? ' confirmed' : v ? ' listening' : '');
  document.getElementById('val-hint').textContent = confirmed
    ? '✓ Kaydedildi'
    : (v ? '✓ Kaydet\'e basın' : 'Mikrofona basın veya aşağıya yazın');
}

function doConfirm(val) {
  const v = String(val ?? '').trim();
  if (v === '' || !active) return;
  const { rep, plant, char } = cellAt(active, curIdx);
  setv(active, rep, plant, char, v);
  active.lastIdx = curIdx;
  persist();
  updateValDisplay(v, true);
  document.getElementById('mic-btn').className = 'mic-btn confirming';
  clearCd();
  setTimeout(() => {
    document.getElementById('mic-btn').className = 'mic-btn';
    if (curIdx < totalCells(active)-1) { curIdx++; renderEntry(); }
    else { document.getElementById('prog-text').textContent = '🎉 Tüm değerler girildi!'; }
  }, 400);
}

document.getElementById('dikte-inp').addEventListener('input', e => {
  tempVal = e.target.value;
  updateValDisplay(e.target.value, false);
});
document.getElementById('dikte-inp').addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); doConfirm(tempVal); }
});

document.getElementById('btn-confirm').addEventListener('click', () => {
  clearCd();
  doConfirm(tempVal || document.getElementById('dikte-inp').value);
});
document.getElementById('btn-prev').addEventListener('click', () => { clearCd(); stopRec(); if(curIdx>0){curIdx--;renderEntry();} });
document.getElementById('btn-skip').addEventListener('click', () => { clearCd(); stopRec(); if(curIdx<totalCells(active)-1){curIdx++;renderEntry();} });
document.getElementById('btn-to-export').addEventListener('click', () => { stopRec(); renderExport(); show('export'); });

// countdown
function startCd(val) {
  clearCd(); let s=2;
  const el = document.getElementById('countdown');
  el.textContent = `${s} sn içinde kaydedilecek…`;
  cdTimer = setInterval(() => { s--; if(s<=0){clearCd();doConfirm(val);}else el.textContent=`${s} sn içinde kaydedilecek…`; }, 1000);
}
function clearCd() {
  if(cdTimer){clearInterval(cdTimer);cdTimer=null;}
  document.getElementById('countdown').textContent='';
}

// ── SPEECH (Android) ─────────────────────────────────────────
document.getElementById('mic-btn').addEventListener('click', () => {
  const btn = document.getElementById('mic-btn');
  if (!SR) { alert('Chrome kullanın.'); return; }
  if (btn.classList.contains('listening')) { stopRec(); return; }
  clearCd(); tempVal=''; updateValDisplay('',false);
  recog = new SR(); recog.lang='tr-TR'; recog.continuous=false; recog.interimResults=true;
  recog.onresult = e => {
    let interim='',final='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      const tx=e.results[i][0].transcript.trim();
      if(e.results[i].isFinal)final=tx;else interim=tx;
    }
    const v=final||interim; tempVal=v; updateValDisplay(v,false);
    if(final){btn.className='mic-btn';startCd(final);}
  };
  recog.onend=()=>{btn.className='mic-btn';};
  recog.onerror=e=>{btn.className='mic-btn';if(e.error!=='no-speech')document.getElementById('val-hint').textContent='Hata: '+e.error;};
  recog.start(); btn.className='mic-btn listening';
});

function stopRec() {
  if(recog){try{recog.stop();}catch(e){}recog=null;}
  document.getElementById('mic-btn').className='mic-btn';
  clearCd();
}

// ── EXPORT ───────────────────────────────────────────────────
function buildRows(t) {
  const allRows = [];
  for (let r = 0; r < t.reps; r++) {
    // Section header (like Excel: "Karakterler/Bitki Sayısı | 101 | 102...")
    const header = r === 0
      ? 'Karakterler/Bitki Sayısı'
      : `${r+1}. tekerrür Karakterler/Bitki Sayısı`;
    const charCodes = Array.from({length:t.chars}, (_,ci) => charCode(r,ci));
    allRows.push({ type:'header', label: header, codes: charCodes, rep: r });
    // Plant rows
    for (let p = 0; p < t.plants; p++) {
      const vals = Array.from({length:t.chars}, (_,ci) => getv(t,r,p,ci));
      allRows.push({ type:'data', plant: p+1, vals });
    }
  }
  return allRows;
}

function renderExport() {
  const t = active;
  const rows = buildRows(t);
  let html = '<tbody>';
  rows.forEach(row => {
    if (row.type === 'header') {
      html += `<tr><td class="section-header" colspan="${t.chars+1}">${row.label}</td></tr>`;
      html += '<tr><td class="row-label">Bitki</td>' + row.codes.map(c=>`<th>${c}</th>`).join('') + '</tr>';
    } else {
      html += `<tr><td class="row-label">${row.plant}</td>` +
        row.vals.map(v => v !== '' ? `<td>${v}</td>` : `<td class="empty">—</td>`).join('') + '</tr>';
    }
  });
  html += '</tbody>';
  document.getElementById('exp-table').innerHTML = html;
  renderContacts();
}

function buildXlsxBlob(t) {
  const wb = XLSX.utils.book_new();
  const wsData = [];
  for (let r = 0; r < t.reps; r++) {
    const label = r === 0 ? 'Karakterler/Bitki Sayısı' : `${r+1}. tekerrür Karakterler/Bitki Sayısı`;
    const codes = Array.from({length:t.chars}, (_,ci) => charCode(r,ci));
    wsData.push([label, ...codes]);
    for (let p = 0; p < t.plants; p++) {
      const row = [p+1];
      for (let ci = 0; ci < t.chars; ci++) {
        const v = getv(t,r,p,ci);
        const n = parseFloat(v);
        row.push(v !== '' && !isNaN(n) ? n : v);
      }
      wsData.push(row);
    }
    wsData.push([]);
  }
  const ws = XLSX.utils.aoa_to_sheet(wsData);
  ws['!cols'] = [{wch:30}, ...Array(t.chars).fill({wch:8})];
  XLSX.utils.book_append_sheet(wb, ws, t.name.slice(0,31));
  return { wb, filename: (t.name+'_'+t.date).replace(/[\s/\\:*?"<>|]/g,'_')+'.xlsx' };
}

document.getElementById('btn-dl').addEventListener('click', () => {
  const { wb, filename } = buildXlsxBlob(active);
  XLSX.writeFile(wb, filename);
});

document.getElementById('btn-share').addEventListener('click', async () => {
  if (!navigator.share) { alert('Tarayıcınız paylaşımı desteklemiyor. Dosyayı indirip manuel gönderin.'); return; }
  const t = active;
  const { wb, filename } = buildXlsxBlob(t);
  const buf = XLSX.write(wb, { bookType:'xlsx', type:'array' });
  const file = new File([buf], filename, { type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
  try {
    await navigator.share({ files:[file], title: t.name });
  } catch(e) {
    if (e.name !== 'AbortError') alert('Paylaşım başarısız: ' + e.message);
  }
});

// ── CONTACTS ─────────────────────────────────────────────────
let contacts = JSON.parse(localStorage.getItem('tarla_contacts') || '[]');
function saveContacts() { localStorage.setItem('tarla_contacts', JSON.stringify(contacts)); }

function renderContacts() {
  const el = document.getElementById('contacts-list');
  if (!contacts.length) { el.innerHTML = '<div style="font-size:.82rem;color:var(--muted);padding:4px 0">Henüz kişi eklenmedi.</div>'; return; }
  el.innerHTML = contacts.map((c,i) => `
    <div class="contact-row">
      <div style="flex:1">
        <div class="contact-name">${c.name}</div>
        <div class="contact-phone">${c.phone}</div>
      </div>
      <button class="btn-wa" onclick="shareToWA(${i})">WhatsApp'a Gönder</button>
      <button class="btn-rm" onclick="removeContact(${i})">×</button>
    </div>`).join('');
}

window.shareToWA = async function(i) {
  const c = contacts[i];
  const phone = c.phone.replace(/\D/g,'');
  if (navigator.share) {
    const t = active;
    const { wb, filename } = buildXlsxBlob(t);
    const buf = XLSX.write(wb, { bookType:'xlsx', type:'array' });
    const file = new File([buf], filename, { type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
    try { await navigator.share({ files:[file], title: t.name }); } catch(e) { if(e.name!=='AbortError') alert('Hata: '+e.message); }
  } else {
    window.open(`https://wa.me/${phone}`, '_blank');
  }
};

window.removeContact = function(i) {
  contacts.splice(i,1); saveContacts(); renderContacts();
};

document.getElementById('btn-add-contact').addEventListener('click', () => {
  const name  = document.getElementById('inp-cname').value.trim();
  const phone = document.getElementById('inp-cphone').value.trim();
  if (!name || !phone) { alert('İsim ve telefon numarası girin.'); return; }
  contacts.push({name, phone});
  saveContacts(); renderContacts();
  document.getElementById('inp-cname').value = '';
  document.getElementById('inp-cphone').value = '';
});

document.getElementById('btn-del').addEventListener('click', () => {
  if (!confirm(`"${active.name}" silinsin mi?`)) return;
  trials = trials.filter(t => t.id !== active.id);
  persist(); active = null;
  show('home'); renderHome();
});

// ── INIT ─────────────────────────────────────────────────────
renderPreview();
renderHome();
</script>
